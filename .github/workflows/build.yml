name: Build

on:
  push:
    # TODO : Remove ci-build branch after the workflow is verified to work correctly
    branches: [master, main, ci-build]
  pull_request:
    branches: [master, main]

jobs:
    build-cmake:
      env:
        SCCACHE_GHA_ENABLED: "true"
        # Use a workspace-local binary cache so the path works on both Linux and Windows runners.
        VCPKG_BINARY_SOURCES: "clear;files,${{ github.workspace }}/.vcpkg-bincache,readwrite"
      strategy:
        # TODO : Remove fast fial after the workflow is verified to work correctly. This will allow all the jobs to run even if one of them fails.
        fail-fast: true
        matrix:
            os: [ubuntu-latest, windows-latest]
            preset: [ipc]
            python-version: [3.11]
      runs-on: ${{ matrix.os }}
      steps:
        - uses: actions/checkout@v6
          with:
            submodules: 'true'

        - name: Setup CUDA Toolkit for IPC preset
          uses: Jimver/cuda-toolkit@v0.2.30
          if: matrix.preset == 'ipc'
          id: cuda-toolkit
          with:
            cuda: "12.4.1"

        - uses: actions/setup-python@v6
          with:
            python-version: ${{ matrix.python-version }}
        
        - name: Setup sccache
          uses: mozilla-actions/sccache-action@v0.0.9

        - name: Cache vcpkg binary packages
          uses: actions/cache@v4
          with:
            path: ${{ github.workspace }}/.vcpkg-bincache
            key: >-
              ${{ runner.os }}-vcpkg-${{ matrix.preset }}-${{ hashFiles('vcpkg.json',
              'vcpkg-configuration.json', 'CMakePresets.json') }}
            restore-keys: |
              ${{ runner.os }}-vcpkg-${{ matrix.preset }}-
              ${{ runner.os }}-vcpkg-

        - name: Setup pybind11
          run: pip install pybind11

        - name: Setup MSVC (Windows)
          if: runner.os == 'Windows'
          uses: ilammy/msvc-dev-cmd@v1.13.0

        - name: Export CUDA environment (Windows)
          if: matrix.preset == 'ipc' && runner.os == 'Windows'
          shell: pwsh
          run: |
            "CUDA_PATH=${{ steps.cuda-toolkit.outputs.CUDA_PATH }}" >> $env:GITHUB_ENV
            "CUDAToolkit_ROOT=${{ steps.cuda-toolkit.outputs.CUDA_PATH }}" >> $env:GITHUB_ENV
            "${{ steps.cuda-toolkit.outputs.CUDA_PATH }}\\bin" >> $env:GITHUB_PATH

        - name: Export CUDA environment (Linux)
          if: matrix.preset == 'ipc' && runner.os != 'Windows'
          shell: bash
          run: |
            echo "CUDA_PATH=${{ steps.cuda-toolkit.outputs.CUDA_PATH }}" >> "$GITHUB_ENV"
            echo "CUDAToolkit_ROOT=${{ steps.cuda-toolkit.outputs.CUDA_PATH }}" >> "$GITHUB_ENV"
            echo "${{ steps.cuda-toolkit.outputs.CUDA_PATH }}/bin" >> "$GITHUB_PATH"

        - name: Verify CUDA toolchain
          if: matrix.preset == 'ipc'
          shell: bash
          run: |
            echo "CUDA_PATH=$CUDA_PATH"
            echo "CUDAToolkit_ROOT=$CUDAToolkit_ROOT"
            which nvcc || true
            nvcc --version

        - name: Configure (Windows)
          if: runner.os == 'Windows'
          shell: pwsh
          run: |
            $pybind11Dir = python -m pybind11 --cmakedir
            $cudaRoot = "${{ steps.cuda-toolkit.outputs.CUDA_PATH }}"
            $nvcc = Join-Path $cudaRoot "bin\\nvcc.exe"
            cmake --preset=${{ matrix.preset }}-ci `
              -Dpybind11_DIR="$pybind11Dir" `
              -DCUDAToolkit_ROOT="$cudaRoot" `
              -DCMAKE_CUDA_COMPILER="$nvcc"

        - name: Configure (Linux)
          if: runner.os != 'Windows'
          shell: bash
          run: |
            cmake --preset=${{ matrix.preset }}-ci \
              -Dpybind11_DIR="$(python -m pybind11 --cmakedir)" \
              -DCUDAToolkit_ROOT="$CUDA_PATH"

        - name: Build
          shell: bash
          run: cmake --build --preset=${{ matrix.preset }}-ci -v

        - name: Test
          shell: bash
          run: ctest --preset=${{ matrix.preset }}-ci

        - name: Package
          # TODO : The binary directory here is hardcoded.
          shell: bash
          run : |
            cmake --install build-ci --prefix dist

        - name: Upload artifact
          uses: actions/upload-artifact@v6
          with:
            name: novaphy-${{ matrix.os }}-cmakestandalone
            path: dist/

    build-wheel:
      env:
        SCCACHE_GHA_ENABLED: "true"
        SCCACHE_LOG: "debug"
      strategy:
        # TODO : Remove fast fial after the workflow is verified to work correctly. This will allow all the jobs to run even if one of them fails.
        fail-fast: true
        matrix:
            os: [ubuntu-latest, windows-latest]
            preset: [default]
            python-version: [3.11]
      runs-on: ${{ matrix.os }}
      steps:
        - uses: actions/checkout@v6

        - name: Set up Python ${{ matrix.python-version }}
          uses: actions/setup-python@v6
          with:
            python-version: ${{ matrix.python-version }}

        - name: Install Python build dependencies
          run: pip install scikit-build-core pybind11 numpy pytest build

        - name: Setup sccache
          uses: mozilla-actions/sccache-action@v0.0.9

        - name: Setup MSVC (Windows)
          if: runner.os == 'Windows'
          uses: ilammy/msvc-dev-cmd@v1.13.0

        - name: Build and packaing (Windows)
          if: runner.os == 'Windows'
          env: 
            # Although the preset has defined the generator, skbuild just scan the -G option.
            # On Windows, specify MSVC compiler to avoid MinGW selection with Ninja
            CMAKE_ARGS: "--preset=${{ matrix.preset }}-ci -G Ninja -DCMAKE_CXX_COMPILER=cl.exe -DCMAKE_C_COMPILER=cl.exe"
          run: python -m build . -C build-dir=build-ci -v

        - name: Build and packaging (Linux)
          if: runner.os != 'Windows'
          env: 
            CMAKE_ARGS: "--preset=${{ matrix.preset }}-ci"
          run: python -m build . -C build-dir=build-ci -v

        - name: Upload artifact
          uses: actions/upload-artifact@v6
          with:
            name: novaphy-${{ matrix.os }}-python${{ matrix.python-version }}
            path: dist/*

        - name: Install wheel
          shell: bash
          run: pip install dist/*.whl -v
          
        - name: Run tests
          run: pytest tests/python/ -v

