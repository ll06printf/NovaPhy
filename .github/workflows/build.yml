name: Build

on:
  push:
    # TODO : Remove ci-build branch after the workflow is verified to work correctly
    branches: [master, main, ci-build]
  pull_request:
    branches: [master, main]

jobs:
    build-cmake:
      env:
        SCCACHE_GHA_ENABLED: "true"
      strategy:
        # TODO : Remove fast fial after the workflow is verified to work correctly. This will allow all the jobs to run even if one of them fails.
        fail-fast: true
        matrix:
            os: [ubuntu-latest, windows-latest]
            preset: [ipc]
            python-version: [3.11]
      runs-on: ${{ matrix.os }}
      steps:
        - uses: actions/checkout@v6
          with:
            submodules: 'true'

        - name: Setup CUDA Toolkit for IPC preset
          uses: Jimver/cuda-toolkit@v0.2.30
          if: matrix.preset == 'ipc'
          id: cuda-toolkit
          with:
            cuda: "12.4.1"

        - uses: actions/setup-python@v6
          with:
            python-version: ${{ matrix.python-version }}
        
        - name: Setup sccache
          uses: mozilla-actions/sccache-action@v0.0.9

        - name: Setup pybind11
          run: pip install pybind11

        - name: Setup MSVC (Windows)
          if: runner.os == 'Windows'
          uses: ilammy/msvc-dev-cmd@v1.13.0

        - name: Configure
          shell: bash
          run: |
            export CMAKE_PREFIX_PATH=$(python -m pybind11 --cmakedir)
            cmake --preset=${{ matrix.preset }}-ci

        - name: Build
          shell: bash
          run: cmake --build --preset=${{ matrix.preset }}-ci -v

        - name: Test
          shell: bash
          run: ctest --preset=${{ matrix.preset }}-ci

        - name: Package
          # TODO : The binary directory here is hardcoded.
          shell: bash
          run : |
            cmake --install build-ci --prefix dist

        - name: Upload artifact
          uses: actions/upload-artifact@v6
          with:
            name: novaphy-${{ matrix.os }}-cmakestandalone
            path: dist/

    build-wheel:
      env:
        SCCACHE_GHA_ENABLED: "true"
      strategy:
        # TODO : Remove fast fial after the workflow is verified to work correctly. This will allow all the jobs to run even if one of them fails.
        fail-fast: true
        matrix:
            os: [ubuntu-latest, windows-latest]
            preset: [default]
            python-version: [3.11]
      runs-on: ${{ matrix.os }}
      steps:
        - uses: actions/checkout@v6

        - name: Set up Python ${{ matrix.python-version }}
          uses: actions/setup-python@v6
          with:
            python-version: ${{ matrix.python-version }}

        - name: Install Python build dependencies
          run: pip install scikit-build-core pybind11 numpy pytest build

        - name: Setup sccache
          uses: mozilla-actions/sccache-action@v0.0.9

        - name: Setup MSVC (Windows)
          if: runner.os == 'Windows'
          uses: ilammy/msvc-dev-cmd@v1.13.0

        - name: Build and packaing (Windows)
          if: runner.os == 'Windows'
          env: 
            # Although the preset has defined the generator, skbuild just scan the -G option.
            # On Windows, specify MSVC compiler to avoid MinGW selection with Ninja
            CMAKE_ARGS: "--preset=${{ matrix.preset }}-ci -G Ninja -DCMAKE_CXX_COMPILER=cl.exe -DCMAKE_C_COMPILER=cl.exe"
          run: python -m build . -C build-dir=build-ci -v

        - name: Build and packaging (Linux)
          if: runner.os != 'Windows'
          env: 
            CMAKE_ARGS: "--preset=${{ matrix.preset }}-ci"
          run: python -m build . -C build-dir=build-ci -v

        - name: Upload artifact
          uses: actions/upload-artifact@v6
          with:
            name: novaphy-${{ matrix.os }}-python${{ matrix.python-version }}
            path: dist/*

        - name: Install wheel
          shell: bash
          run: pip install dist/*.whl -v
          
        - name: Run tests
          run: pytest tests/python/ -v

