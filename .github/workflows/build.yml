name: CI

on:
  push:
    # TODO : Remove ci-build branch after the workflow is verified to work correctly
    branches: [master, main, ci-build]
  pull_request:
    branches: [master, main]

jobs:
    build-cmake:
      strategy:
        fail-fast: true
        matrix:
            os: [ubuntu-latest, windows-latest]
      runs-on: ${{ matrix.os }}
      steps:
        - uses: actions/checkout@v4

        - name: Configure
          shell: bash
          run: cmake -S . -B build --preset=default-ci

        - name: Build
          shell: bash
          run: cmake --build build --preset=default-ci

        - name: Test
          shell: bash
          run: ctest --test-dir build --preset=default-ci

        - name: Package
          shell: bash
          run : |
            cmake --install build --prefix dist

        - name: Upload artifact
          uses: actions/upload-artifact@v4
          with:
            name: novaphy-${{ matrix.os }}-cmakestandalone
            path: dist/

    build-wheel:
      strategy:
        fail-fast: true
        matrix:
            os: [ubuntu-latest, windows-latest]
            python-version: [3.11]
      runs-on: ${{ matrix.os }}
      steps:
        - uses: actions/checkout@v4

        - name: Set up Python ${{ matrix.python-version }}
          uses: actions/setup-python@v4
          with:
            python-version: ${{ matrix.python-version }}

        - name: Install Python build dependencies
          run: pip install scikit-build-core pybind11 numpy pytest build

        - name: Build and install
          env: 
            CMAKE_ARGS: "--preset=default-ci"
          run: pip install . -C build-dir=build

        - name: Run tests
          run: pytest tests/python/ -v

        - name: Package wheel
          run: python -m build --wheel --outdir dist -C build-dir=build

        - name: Upload artifact
          uses: actions/upload-artifact@v4
          with:
            name: novaphy-${{ matrix.os }}-python${{ matrix.python-version }}
            path: dist/*